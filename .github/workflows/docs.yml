name: Docs

on:
  push:
  pull_request:

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check documentation links and inventory
        run: python3 scripts/check-docs.py
